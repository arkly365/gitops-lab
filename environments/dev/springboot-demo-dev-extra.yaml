apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: springboot-demo-dev-extra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/arkly365/gitops-lab.git
    targetRevision: main
    path: environments/dev
    directory:
      include: springboot-demo-dev-servicemonitor.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: springboot-demo-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true